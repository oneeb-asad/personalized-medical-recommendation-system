<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medical Recommendation System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <!--Calling css file here -->
    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', filename='css/styles.css') }}"
    />
  </head>
  <body>
    <div class="main-container">
      <!-- Header Section -->
      <div class="header-section">
        <div class="header-icon">
          <i class="fas fa-stethoscope"></i>
        </div>
        <h1>Medical Recommendation System</h1>
        <p class="subtitle">AI-Powered Health Analysis & Disease Prediction</p>
      </div>

      <!-- Main Card -->
      <div class="symptoms-card">
        <h2 class="section-title">
          <i
            class="fas fa-clipboard-list"
            style="margin-right: 10px; color: var(--secondary-color)"
          ></i>
          Select Your Symptoms
        </h2>

        <!-- Error Message (if any) -->
        {% if error %}
        <div class="error-message">
          <i class="fas fa-exclamation-triangle" style="margin-right: 10px"></i>
          {{ error }}
        </div>
        {% endif %}

        <form id="symptomForm" action="/predict" method="POST">
          <!-- Search Bar -->
          <div class="search-container">
            <input
              type="text"
              id="searchInput"
              class="search-input"
              placeholder="Search for symptoms... (e.g., fever, cough, headache)"
            />
            <button type="button" id="clearSearch" class="clear-search">
              ×
            </button>
            <i class="fas fa-search search-icon"></i>
          </div>

          <!-- Simplifying symptoms section -->
          <div class="symptoms-container" id="symptomsContainer">
            <div class="symptoms-grid" id="symptomsGrid">
              {% for symptom in symptoms %}
              <div
                class="symptom-item"
                onclick="toggleSymptom(this)"
                data-symptom="{{ symptom.lower() }}"
              >
                <input
                  type="checkbox"
                  name="symptoms"
                  value="{{ symptom }}"
                  class="symptom-checkbox"
                />
                <label class="symptom-label">
                  <div class="symptom-icon">
                    <!-- Icons Logic -->
                    <i class="{{ symptom_icons[symptom] }}"></i>
                  </div>
                  {{ symptom.replace('_', ' ').title() }}
                </label>
              </div>
              {% endfor %}
            </div>
          </div>

          <div class="predict-section">
            <div
              class="selected-count"
              id="selectedCount"
              style="display: none"
            >
              <i class="fas fa-check-circle"></i>
              <span id="countText">0 symptoms selected</span>
            </div>

            <button type="submit" class="predict-btn">
              <i class="fas fa-brain"></i>
              Analyze Symptoms & Predict Disease
              <i class="fas fa-arrow-right"></i>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- JavaScript stays the same -->
    <script>
      let selectedCount = 0;

      function toggleSymptom(element) {
        const checkbox = element.querySelector(".symptom-checkbox");
        const countElement = document.getElementById("selectedCount");
        const countText = document.getElementById("countText");

        checkbox.checked = !checkbox.checked;

        if (checkbox.checked) {
          element.classList.add("selected");
          selectedCount++;
        } else {
          element.classList.remove("selected");
          selectedCount--;
        }

        if (selectedCount > 0) {
          countElement.style.display = "inline-block";
          countText.textContent = `${selectedCount} symptom${
            selectedCount > 1 ? "s" : ""
          } selected`;
        } else {
          countElement.style.display = "none";
        }
      }

      const searchInput = document.getElementById("searchInput");
      const clearSearch = document.getElementById("clearSearch");
      const symptomItems = document.querySelectorAll(".symptom-item");

      searchInput.addEventListener("input", function () {
        const searchTerm = this.value.toLowerCase().trim();
        clearSearch.style.display = searchTerm ? "block" : "none";

        symptomItems.forEach((item) => {
          const symptomText = item.getAttribute("data-symptom");
          const symptomLabel = item
            .querySelector(".symptom-label")
            .textContent.toLowerCase();

          if (
            symptomText.includes(searchTerm) ||
            symptomLabel.includes(searchTerm)
          ) {
            item.style.display = "block";
          } else {
            item.style.display = "none";
          }
        });
      });

      clearSearch.addEventListener("click", function () {
        searchInput.value = "";
        this.style.display = "none";

        symptomItems.forEach((item) => {
          item.style.display = "block";
        });
      });

      document
        .getElementById("symptomForm")
        .addEventListener("submit", function (e) {
          const checkboxes = document.querySelectorAll(
            'input[name="symptoms"]:checked'
          );

          if (checkboxes.length === 0) {
            e.preventDefault();
            alert("Please select at least one symptom before predicting.");
            return false;
          }
        });
    </script>
  </body>
</html>
